{{define "header"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}}</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="site">
  <a class="logo" href="/">Match My Jam</a>
  <nav>
    {{if .User}}
      <a class="navlink" href="/dashboard">Dashboard</a>
      <a class="navlink" href="/friends">Friends</a>
      <a class="navlink invite-nav" href="/invite" title="Invite a friend" aria-label="Invite a friend">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span>Invite</span>
      </a>
      <a class="navlink" href="/settings">Settings</a>
      <form action="/logout" method="post" class="inline">
        <button class="ghost" type="submit">Log out</button>
      </form>
    {{else}}
      <a class="ghost" href="/login">Log in</a>
    {{end}}
  </nav>
</header>
<main>
{{end}}

{{define "footer"}}
</main>
<footer class="site">
  <span>Match My Jam · find the music you share</span>
  <a href="https://github.com/alan-botts/match-my-jam" target="_blank" rel="noopener">GitHub</a>
</footer>
</body>
</html>
{{end}}
